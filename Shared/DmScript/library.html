<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>DM Script — DnD Book</title>
  <link rel="stylesheet" href="../Styles/tokens.css"/>
  <link rel="stylesheet" href="../Styles/book.css"/>
  <link rel="stylesheet" href="dm-script-library.css"/>
</head>
<body>
  <div id="dm-script-library" class="book-chrome">
    <header class="book-header" id="book-nav"></header>
    <header class="top-bar">
      <h1>DM Script</h1>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" id="lang-en" aria-pressed="true">EN</button>
        <button type="button" id="lang-ua" aria-pressed="false">UA</button>
      </div>
    </header>
    <div class="library-main no-right-sidebar">
      <aside class="sidebar sidebar-list" aria-label="Scene list"><nav id="list-nav"></nav></aside>
      <main class="book-center">
        <div id="empty-state"><strong>Loading…</strong></div>
        <div id="content-page" class="content-page wide" hidden></div>
      </main>
    </div>
    <footer class="pagination">
      <button type="button" id="prev-page">&#9664; Prev scene</button>
      <span id="page-info">Scene 1 of 1</span>
      <button type="button" id="next-page">Next scene &#9654;</button>
    </footer>
  </div>
  <script src="../Core/library-shell.js"></script>
  <script src="../Core/locale.js"></script>
  <script src="../Core/markdown.js"></script>
  <script src="../Core/content-schema.js"></script>
  <script src="../Core/mechanical.js"></script>
  <script src="../Core/book-nav.js"></script>
  <script src="../Core/library-loader.js"></script>
  <script src="../Core/entity-library.js"></script>
  <script src="dm-script-library.js"></script>
</body>
</html>
